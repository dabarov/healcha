name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            rust-targets: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          # AppImage bundling (linuxdeploy) chokes on the large bundled Node
          # runtime, so Linux ships deb + rpm.
          - platform: ubuntu-latest
            rust-targets: ""
            args: --bundles deb,rpm
          - platform: windows-latest
            rust-targets: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.rust-targets }}
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "healcha ${{ github.ref_name }}"
          releaseBody: "See the assets below for your platform."
          releaseDraft: true
          args: ${{ matrix.args }}
